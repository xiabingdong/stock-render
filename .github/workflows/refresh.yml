name: Refresh Stocks

on:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时执行
  workflow_dispatch:  # 允许手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh each stock
        run: |
          URL="https://stock-render-hz41.onrender.com"
          STOCKS="AAPL MSFT INTC NVDA LITE META TSLA AMD GOOGL AMZN"
          
          for sym in $STOCKS; do
            echo "Fetching $sym..."
            curl -s --max-time 15 "$URL/api/analyze/$sym" -o /dev/null -w "HTTP:%{http_code}\n"
          done
          
          echo "✅ 全部刷新完成"
