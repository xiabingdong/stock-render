<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📊 股票分析系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app">
        <!-- 顶部 -->
        <header class="header">
            <h1>📊 股票分析</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="analyzeAll()">🔄 刷新全部</button>
            </div>
        </header>

        <!-- 大盘指数 -->
        <div class="section" id="indices"></div>

        <!-- 关注列表 -->
        <div class="section" id="stocks"></div>

        <!-- 股票详情弹窗 -->
        <div class="modal" id="detail-modal" style="display:none">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div id="detail-content"></div>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="tab-bar">
            <button class="tab-item active" onclick="showTab('stocks', this)">📊 列表</button>
            <button class="tab-item" onclick="showTab('history', this)">📈 历史</button>
            <button class="tab-item" onclick="showTab('settings', this)">⚙️ 设置</button>
        </nav>
    </div>

    <!-- 历史页面 -->
    <div class="page" id="page-history" style="display:none">
        <header class="header">
            <h1>📈 历史分析</h1>
        </header>
        <div id="history-content"></div>
        <div class="tab-bar">
            <button class="tab-item" onclick="showTab('stocks', this)">📊 列表</button>
            <button class="tab-item active" onclick="showTab('history', this)">📈 历史</button>
            <button class="tab-item" onclick="showTab('settings', this)">⚙️ 设置</button>
        </div>
    </div>

    <!-- 设置页面 -->
    <div class="page" id="page-settings" style="display:none">
        <header class="header">
            <h1>⚙️ 设置</h1>
        </header>
        <div class="settings-content">
            <p>关注股票: <span id="settings-count"></span></p>
            <p>数据源: Twelve Data, Alpha Vantage, Finnnub</p>
            <p>最后刷新: <span id="settings-time">--</span></p>
        </div>
        <div class="tab-bar">
            <button class="tab-item" onclick="showTab('stocks', this)">📊 列表</button>
            <button class="tab-item" onclick="showTab('history', this)">📈 历史</button>
            <button class="tab-item active" onclick="showTab('settings', this)">⚙️ 设置</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
